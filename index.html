<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoes Gallery | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="announcement-bar">
        <span>Seen our new collection yet? <a href="javascript:void(0)">GO ↗</a></span>
    </div>

    <header class="navbar">
        <div class="logo">Shoes Gallery</div>
        <nav>
            <ul class="nav-links">
                <li><a href="javascript:void(0)" class="gender-filter" data-gender="men">Men</a></li>
                <li><a href="javascript:void(0)" class="gender-filter" data-gender="women">Women</a></li>
                <li><a href="javascript:void(0)">Kids</a></li>
                <li><a href="javascript:void(0)">Brands</a></li>
                <li><a href="javascript:void(0)">Sale</a></li>
            </ul>
        </nav>
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px;">
            <a href="javascript:void(0)" class="nav-links" style="font-size: 0.8rem; text-decoration: none; color: white;">Account 👤</a>
            <a href="javascript:void(0)" class="nav-links" style="font-size: 0.8rem; text-decoration: none; color: white;">Favorites ❤️</a>
            <a href="javascript:void(0)" class="cart-link">
                <span>Cart</span>
                <span class="cart-icon">🛒</span>
            </a>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="filter-group">
                <h3>Sort by:</h3>
                <label class="sort-option"><input type="radio" name="sort" value="price-low" class="sort-radio"> Price Low to High</label>
                <label class="sort-option"><input type="radio" name="sort" value="price-high" class="sort-radio"> Price High to Low</label>
                <label class="sort-option"><input type="radio" name="sort" value="name-az" class="sort-radio"> Product name A - Z</label>
            </div>
            
            <div class="filter-links">
                <h3>Filter by Brand:</h3>
                <div id="brand-filters-container"></div>
                <button class="filter-btn" id="show-all-btn" style="color: white; font-weight: bold; margin-top: 15px;">Show All</button>
            </div>
        </aside>

        <main class="content">
            <section id="popular">
                <div class="section-header">
                    <h2>Most popular</h2>
                    <a href="#all-shoes" class="see-more">SEE MORE →</a>
                </div>
                <div id="recommandations-container" class="product-grid"></div>
            </section>

            <section id="all-shoes">
                <div class="section-header">
                    <h2>All our shoes</h2>
                    <span class="results-count"><span id="results-length">0</span> result(s)</span>
                </div>
                <div id="cards-container" class="product-grid"></div>
            </section>
        </main>

        <script src="script.js"></script>
    </div>
</body>
</html>
